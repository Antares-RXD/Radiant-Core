name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libboost-all-dev \
            libevent-dev \
            libssl-dev \
            libdb++-dev \
            libminiupnpc-dev \
            libzmq3-dev \
            libqt5gui5 \
            libqt5core5a \
            libqt5dbus5 \
            qttools5-dev \
            qttools5-dev-tools \
            libqrencode-dev \
            libprotobuf-dev \
            protobuf-compiler \
            help2man

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_RADIANT_QT=ON \
            -DBUILD_RADIANT_WALLET=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Create release package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p radiant-${VERSION}-linux-x64
          cp build/src/radiantd radiant-${VERSION}-linux-x64/ || true
          cp build/src/radiant-cli radiant-${VERSION}-linux-x64/ || true
          cp build/src/radiant-tx radiant-${VERSION}-linux-x64/ || true
          cp build/src/radiant-wallet radiant-${VERSION}-linux-x64/ || true
          cp build/src/qt/radiant-qt radiant-${VERSION}-linux-x64/ || true
          cp README.md radiant-${VERSION}-linux-x64/ || true
          cp COPYING radiant-${VERSION}-linux-x64/ || true
          tar -czvf radiant-${VERSION}-linux-x64.tar.gz radiant-${VERSION}-linux-x64
          zip -r radiant-${VERSION}-linux-x64.zip radiant-${VERSION}-linux-x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radiant-linux-x64
          path: |
            radiant-*-linux-x64.tar.gz
            radiant-*-linux-x64.zip

  build-macos:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install \
            cmake \
            ninja \
            boost \
            libevent \
            openssl@3 \
            berkeley-db@4 \
            miniupnpc \
            zeromq \
            qt@5 \
            qrencode \
            protobuf

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_RADIANT_QT=ON \
            -DBUILD_RADIANT_WALLET=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBerkeleyDB_ROOT=$(brew --prefix berkeley-db@4) \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Create DMG
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p radiant-${VERSION}-macos
          cp build/src/radiantd radiant-${VERSION}-macos/ || true
          cp build/src/radiant-cli radiant-${VERSION}-macos/ || true
          cp build/src/radiant-tx radiant-${VERSION}-macos/ || true
          cp build/src/radiant-wallet radiant-${VERSION}-macos/ || true
          cp -R build/src/qt/Radiant-Qt.app radiant-${VERSION}-macos/ || true
          cp README.md radiant-${VERSION}-macos/ || true
          cp COPYING radiant-${VERSION}-macos/ || true
          
          # Create DMG
          hdiutil create -volname "Radiant-${VERSION}" \
            -srcfolder radiant-${VERSION}-macos \
            -ov -format UDZO \
            radiant-${VERSION}-macos.dmg || true
          
          # Also create zip
          zip -r radiant-${VERSION}-macos.zip radiant-${VERSION}-macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radiant-macos
          path: |
            radiant-*-macos.dmg
            radiant-*-macos.zip

  build-gui-packages:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: radiant-linux-x64
          path: binaries/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: radiant-macos
          path: binaries/macos

      - name: Build GUI packages
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
          
          # Create GUI package for Linux
          echo "Building Linux GUI package..."
          mkdir -p radiant-core-gui-linux-x64-v${VERSION}
          
          # Extract Linux binaries
          tar -xzf binaries/linux/radiant-*-linux-x64.tar.gz --strip-components=1 -C radiant-core-gui-linux-x64-v${VERSION}/ 2>/dev/null || \
          unzip -o binaries/linux/radiant-*-linux-x64.zip -d temp-linux && mv temp-linux/*/radiant* radiant-core-gui-linux-x64-v${VERSION}/ 2>/dev/null || true
          
          # Copy GUI files
          cp gui/radiant_node_web.py radiant-core-gui-linux-x64-v${VERSION}/
          cp gui/bip39.py radiant-core-gui-linux-x64-v${VERSION}/
          
          # Create launcher script
          cat > radiant-core-gui-linux-x64-v${VERSION}/start-gui.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          chmod +x radiantd radiant-cli radiant-tx 2>/dev/null
          echo "Starting Radiant Core GUI..."
          python3 radiant_node_web.py
          EOF
          chmod +x radiant-core-gui-linux-x64-v${VERSION}/start-gui.sh
          
          # Create README
          cat > radiant-core-gui-linux-x64-v${VERSION}/README.txt << 'EOF'
          Radiant Core GUI - All-in-One Package
          =====================================
          
          Quick Start:
            ./start-gui.sh
          
          The GUI opens at http://127.0.0.1:8765
          
          Support: https://radiantblockchain.org
          EOF
          
          tar -czvf radiant-core-gui-linux-x64-v${VERSION}.tar.gz radiant-core-gui-linux-x64-v${VERSION}
          sha256sum radiant-core-gui-linux-x64-v${VERSION}.tar.gz > radiant-core-gui-linux-x64-v${VERSION}.tar.gz.sha256
          
          # Create GUI package for macOS
          echo "Building macOS GUI package..."
          mkdir -p radiant-core-gui-macos-v${VERSION}
          
          # Extract macOS binaries
          unzip -o binaries/macos/radiant-*-macos.zip -d temp-macos 2>/dev/null && \
          cp temp-macos/*/radiantd temp-macos/*/radiant-cli temp-macos/*/radiant-tx radiant-core-gui-macos-v${VERSION}/ 2>/dev/null || true
          
          # Copy GUI files
          cp gui/radiant_node_web.py radiant-core-gui-macos-v${VERSION}/
          cp gui/bip39.py radiant-core-gui-macos-v${VERSION}/
          
          # Create launcher script (.command for double-click)
          cat > radiant-core-gui-macos-v${VERSION}/start-gui.command << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          if xattr -l . 2>/dev/null | grep -q "com.apple.quarantine"; then
              echo "Removing macOS quarantine..."
              xattr -rd com.apple.quarantine .
          fi
          chmod +x radiantd radiant-cli radiant-tx 2>/dev/null
          echo "Starting Radiant Core GUI..."
          python3 radiant_node_web.py
          EOF
          chmod +x radiant-core-gui-macos-v${VERSION}/start-gui.command
          
          # Create README
          cat > radiant-core-gui-macos-v${VERSION}/README.txt << 'EOF'
          Radiant Core GUI - All-in-One Package
          =====================================
          
          Quick Start:
            Double-click "start-gui.command"
          
          First time: If blocked by Gatekeeper, run:
            xattr -rd com.apple.quarantine .
          
          The GUI opens at http://127.0.0.1:8765
          
          Support: https://radiantblockchain.org
          EOF
          
          tar -czvf radiant-core-gui-macos-v${VERSION}.tar.gz radiant-core-gui-macos-v${VERSION}
          sha256sum radiant-core-gui-macos-v${VERSION}.tar.gz > radiant-core-gui-macos-v${VERSION}.tar.gz.sha256

      - name: Upload GUI packages
        uses: actions/upload-artifact@v4
        with:
          name: radiant-gui-packages
          path: |
            radiant-core-gui-*.tar.gz
            radiant-core-gui-*.sha256

  create-release:
    needs: [build-linux, build-macos, build-gui-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.sha256
          draft: true
          generate_release_notes: true
