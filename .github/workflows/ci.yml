name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libboost-all-dev \
            libevent-dev \
            libssl-dev \
            libdb++-dev \
            libminiupnpc-dev \
            libzmq3-dev \
            libqt5gui5 \
            libqt5core5a \
            libqt5dbus5 \
            qttools5-dev \
            qttools5-dev-tools \
            libqrencode-dev \
            libprotobuf-dev \
            protobuf-compiler \
            librsvg2-bin \
            help2man

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

  build-macos-14:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja boost libevent openssl@3 berkeley-db \
            miniupnpc zeromq qt@5 qrencode protobuf librsvg help2man

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DBerkeleyDB_ROOT=$(brew --prefix berkeley-db)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

  build-macos-15:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja boost libevent openssl@3 berkeley-db \
            miniupnpc zeromq qt@5 qrencode protobuf librsvg help2man

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DQt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5 \
            -DBerkeleyDB_ROOT=$(brew --prefix berkeley-db)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

  # Note: macos-latest currently points to macos-14 (Apple Silicon)
  # Available runners: macos-13 (Intel), macos-14 (M1), macos-15 (M1)
  # See: https://github.com/actions/runner-images

