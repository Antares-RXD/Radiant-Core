# These environment variables are set by the build process and read by
# test/functional/test_runner.py and test/util/bitcoin-util-test.py

[environment]
SRCDIR=/Users/main/Downloads/Radiant-Core-main
BUILDDIR=/Users/main/Downloads/Radiant-Core-main/macos-release-arm64
EXEEXT=
RPCAUTH=/Users/main/Downloads/Radiant-Core-main/share/rpcauth/rpcauth.py
EMULATOR=

[components]
# Which components are enabled. Note that bitcoind cannot be disabled by cmake
# and so is always ON.
ENABLE_WALLET=OFF
ENABLE_CLI=ON
ENABLE_BITCOIND=ON
ENABLE_FUZZ=OFF
ENABLE_ZMQ=OFF
