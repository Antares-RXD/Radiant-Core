# Testnet Configuration
testnet=1
server=1
daemon=0
txindex=1

# Logging
debug=1
debug=net
debug=proxy
printtoconsole=1
logtimestamps=1

# Data directory (container path)
datadir=/home/radiant/data-testnet

# Wallet settings
disablewallet=0
walletdir=/home/radiant/wallets-testnet

# DNS settings - allow general testnet discovery
dnsseed=1

# Block download settings
maxconnections=8
maxuploadtarget=5000

[test]
# Network
listen=1
port=27333

# Connect to IPv6 local addresses
addnode=[2a01:b747:19e:314:15:43ba:1a35:86d5]:27333
addnode=[2a01:b747:19e:314:7c41:fb1e:5691:8e58]:27333

# Connect to IPv4 peer address
addnode=10.0.5.94:27333

# RPC Settings
rpcuser=testnet
rpcpassword=testnetpass123
rpcallowip=127.0.0.1
rpcport=27332

